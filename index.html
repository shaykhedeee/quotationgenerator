
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="S360 Quotes">
    <meta name="description" content="Professional interior design quotation & proposal management for Spaces 360">
    <meta property="og:title" content="SPACES 360 — Quotation System">
    <meta property="og:description" content="Create, manage and share professional interior design quotations.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/icon.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="SPACES 360 — Quotation System">
    <meta name="twitter:description" content="Professional interior design quotation management.">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>SPACES 360 - Quotation System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans min-h-screen">
    <!-- Loading splash (hidden once React mounts) -->
    <div id="app-loader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a2e5a;transition:opacity 0.4s ease">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" style="margin-bottom:16px"><rect width="56" height="56" rx="14" fill="white"/><text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-family="Inter,sans-serif" font-weight="900" font-size="22" fill="#1a2e5a">360</text></svg>
      <div style="width:40px;height:3px;background:rgba(255,255,255,0.2);border-radius:99px;overflow:hidden"><div id="app-loader-bar" style="height:100%;width:0%;background:#fff;border-radius:99px;animation:loadbar 1.2s ease-in-out infinite"></div></div>
      <style>@keyframes loadbar{0%{width:0%}60%{width:85%}100%{width:100%}}</style>
    </div>
    <script>window.addEventListener('DOMContentLoaded',function(){var el=document.getElementById('app-loader');if(el){setTimeout(function(){el.style.opacity='0';setTimeout(function(){el.style.display='none'},400)},200)}});</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
